<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="A curated collection of fascinating verified facts from science, history, technology, and nature." />
  <title>Intermezzo — Curious Facts Archive</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    :root {
      --bg: #0a0a0f; --card: #12121a; --text: #f4f4f5; --muted: #a1a1aa;
      --accent: #6366f1; --accent-light: #818cf8; --border: #272730;
      --success: #10b981; --warning: #f59e0b;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #fafafa; --card: #ffffff; --text: #18181b; --muted: #71717a;
        --accent: #4f46e5; --accent-light: #6366f1; --border: #e4e4e7;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.6;
      padding: 0; max-width: 100%; margin: 0 auto;
    }
    
    /* Hero Section */
    .hero {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      padding: 60px 20px 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
      animation: pulse 15s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.1) rotate(5deg); }
    }
    .hero-content { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 {
      font-size: 42px; font-weight: 800; letter-spacing: -1px;
      color: white; margin-bottom: 12px;
    }
    .tagline {
      font-size: 18px; color: rgba(255,255,255,0.9);
      font-weight: 400; line-height: 1.5;
    }
    .stats {
      display: flex; gap: 24px; justify-content: center;
      margin-top: 32px; flex-wrap: wrap;
    }
    .stat {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 16px 24px; border-radius: 12px;
      color: white;
    }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-label { font-size: 13px; opacity: 0.9; margin-top: 4px; }
    
    /* Main Content */
    .container { max-width: 1000px; margin: 0 auto; padding: 40px 20px; }
    
    /* Search & Filters */
    .controls {
      display: flex; gap: 12px; margin-bottom: 32px;
      flex-wrap: wrap; align-items: center;
    }
    .search-box {
      flex: 1; min-width: 200px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      color: var(--text);
    }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filter-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 8px 16px;
      border-radius: 20px; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--accent); color: white;
      border-color: var(--accent);
    }
    
    /* Grid */
    .grid {
      display: grid; gap: 20px;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    }
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px;
      cursor: pointer; transition: all 0.3s;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light));
      opacity: 0; transition: opacity 0.3s;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .card:hover::before { opacity: 1; }
    .card-verified {
      position: absolute; top: 16px; right: 16px;
      background: var(--success); color: white;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .card-unverified {
      position: absolute; top: 16px; right: 16px;
      background: var(--warning); color: #000;
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 20px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .card-topic {
      font-size: 12px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--accent-light);
      font-weight: 700; margin-bottom: 12px;
    }
    .card-fact {
      font-size: 15px; line-height: 1.6;
      margin-bottom: 16px;
    }
    .card-meta {
      display: flex; justify-content: space-between;
      align-items: center; font-size: 12px; color: var(--muted);
    }
    .sources-badge {
      display: flex; align-items: center; gap: 6px;
    }
    .source-icon { font-size: 14px; }
    
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      display: none; place-items: center;
      z-index: 1000;
    }
    .modal-overlay.active { display: grid; }
    .modal {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; max-width: 560px;
      width: 90%; max-height: 85vh; overflow-y: auto;
      padding: 32px; position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .close-btn {
      position: absolute; top: 20px; right: 20px;
      background: var(--bg); border: 1px solid var(--border);
      width: 40px; height: 40px; border-radius: 50%;
      font-size: 20px; cursor: pointer;
      color: var(--text); display: grid; place-items: center;
      transition: all 0.2s;
    }
    .close-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
    .modal-topic {
      font-size: 13px; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--accent-light);
      font-weight: 700; margin-bottom: 16px;
    }
    .modal-fact {
      font-size: 18px; line-height: 1.7;
      margin-bottom: 24px; font-weight: 400;
    }
    .modal-section {
      margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .modal-section h3 {
      font-size: 13px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
      margin-bottom: 12px; font-weight: 600;
    }
    .source-link {
      display: block; font-size: 14px;
      color: var(--accent-light); text-decoration: none;
      margin: 8px 0; padding: 10px;
      background: var(--bg); border-radius: 8px;
      transition: all 0.2s; word-break: break-all;
    }
    .source-link:hover {
      background: var(--accent); color: white;
      transform: translateX(4px);
    }
    .modal-date {
      font-size: 13px; color: var(--muted);
      margin-top: 20px; padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    
    /* CTA Section */
    .cta {
      text-align: center; padding: 60px 20px;
      background: var(--card); border-top: 1px solid var(--border);
      margin-top: 60px;
    }
    .cta h2 { font-size: 28px; margin-bottom: 12px; }
    .cta p { color: var(--muted); margin-bottom: 24px; }
    .cta-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      padding: 12px 24px; border-radius: 12px;
      font-weight: 600; text-decoration: none;
      display: inline-block; transition: all 0.2s;
      border: none; cursor: pointer; font-size: 15px;
    }
    .btn-primary {
      background: var(--accent); color: white;
    }
    .btn-primary:hover {
      background: var(--accent-light);
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover {
      border-color: var(--accent);
    }
    
    .loading {
      text-align: center; padding: 80px 20px;
      color: var(--muted); font-size: 16px;
    }
    
    @media (max-width: 600px) {
      .hero { padding: 40px 20px 60px; }
      h1 { font-size: 32px; }
      .stats { gap: 12px; }
      .stat { padding: 12px 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- Hero -->
  <section class="hero">
    <div class="hero-content">
      <div class="logo">🧠</div>
      <h1>Intermezzo</h1>
      <p class="tagline">A curated collection of fascinating verified facts from science, history, technology, and nature.</p>
      <div class="stats" id="stats">
        <div class="stat">
          <div class="stat-value" id="totalFacts">-</div>
          <div class="stat-label">Facts Collected</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="topicsCount">-</div>
          <div class="stat-label">Topics</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="verifiedCount">-</div>
          <div class="stat-label">✅ Verified</div>
        </div>
      </div>
    </div>
  </section>

  <!-- Main Content -->
  <main class="container">
    <!-- Controls -->
    <div class="controls">
      <input type="text" class="search-box" id="searchBox" placeholder="Search facts..." />
      <div class="filters" id="filters"></div>
    </div>

    <!-- Grid -->
    <div class="grid" id="grid"></div>
  </main>

  <!-- CTA -->
  <section class="cta">
    <h2>Want Daily Curiosities?</h2>
    <p>Add the widget to your home screen for daily verified facts.</p>
    <div class="cta-buttons">
      <a href="https://github.com/GustavoIbenc/intermezzos" class="btn btn-primary">View on GitHub →</a>
      <a href="SHORTCUT_EXACT_STEPS.md" class="btn btn-secondary">🍎 iOS Widget Setup</a>
    </div>
  </section>

  <!-- Modal -->
  <button class="close-btn" onclick="closeModal()">×</button>
  <div class="modal-overlay" id="overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-topic" id="mTopic"></div>
      <div class="modal-fact" id="mFact"></div>
      <div class="modal-section" id="mSources"></div>
      <div class="modal-date" id="mDate"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});</script>
</body>
</html>
